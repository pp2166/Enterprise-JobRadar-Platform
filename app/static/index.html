<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>JobRadar</title>
  <link rel="stylesheet" href="/static/app.css" />
</head>
<body>
  <header class="site-header">
    <div>
      <h1>JobRadar</h1>
      <p class="tagline">职位聚合、去重检索与采集任务治理</p>
    </div>
    <nav class="top-nav" aria-label="主导航">
      <button type="button" class="nav-tab active" data-view="search">职位搜索</button>
      <button type="button" class="nav-tab" data-view="crawl-runs">采集任务</button>
    </nav>
  </header>

  <main>
    <section id="search-view" class="view active" aria-labelledby="search-title">
      <div class="section-heading">
        <h2 id="search-title">职位搜索</h2>
      </div>

      <form id="search-form">
        <input type="text" id="q" name="q" placeholder="例如：senior python remote" autofocus />
        <input type="text" id="location" name="location" placeholder="location" />
        <select id="experience" name="experience">
          <option value="">any experience</option>
          <option value="junior">junior</option>
          <option value="mid">mid</option>
          <option value="senior">senior</option>
        </select>
        <label class="check">
          <input type="checkbox" id="remote" name="remote" /> remote only
        </label>
        <button type="submit">搜索</button>
      </form>

      <section id="meta" class="muted-line"></section>
      <section id="results"></section>
      <nav id="pager" class="pager" aria-label="职位分页"></nav>
    </section>

    <section id="crawl-runs-view" class="view" aria-labelledby="crawl-runs-title">
      <div class="section-heading">
        <div>
          <h2 id="crawl-runs-title">采集任务</h2>
          <p class="section-subtitle">只读查看 CrawlRun 生命周期、统计和错误信息</p>
        </div>
        <button type="button" id="refresh-runs" class="secondary-button">刷新</button>
      </div>

      <div id="runs-status" class="muted-line" role="status"></div>
      <div id="runs-error" class="error-panel" hidden></div>
      <div id="runs-empty" class="empty-panel" hidden>暂无采集任务</div>

      <div class="table-wrap">
        <table id="runs-table">
          <thead>
            <tr>
              <th>run_id</th>
              <th>source</th>
              <th>status</th>
              <th>trigger_type</th>
              <th>attempt_count</th>
              <th>received</th>
              <th>inserted</th>
              <th>updated</th>
              <th>duplicates</th>
              <th>error_message</th>
              <th>created_at</th>
              <th>started_at</th>
              <th>finished_at</th>
            </tr>
          </thead>
          <tbody id="runs-body"></tbody>
        </table>
      </div>

      <nav id="runs-pager" class="pager" aria-label="采集任务分页"></nav>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
