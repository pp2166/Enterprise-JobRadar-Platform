services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jobhunt
      POSTGRES_PASSWORD: jobhunt
      POSTGRES_DB: jobhunt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobhunt"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://jobhunt:jobhunt@postgres:5432/jobhunt
      SYNC_DATABASE_URL: postgresql+psycopg2://jobhunt:jobhunt@postgres:5432/jobhunt
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://jobhunt:jobhunt@postgres:5432/jobhunt
      SYNC_DATABASE_URL: postgresql+psycopg2://jobhunt:jobhunt@postgres:5432/jobhunt
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://jobhunt:jobhunt@postgres:5432/jobhunt
      SYNC_DATABASE_URL: postgresql+psycopg2://jobhunt:jobhunt@postgres:5432/jobhunt
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - worker

volumes:
  pgdata:
